<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="form-container">
    <h1>To-Do App</h1>

    <form id="registrationForm" action="submit-form.php" method="POST">
      <!-- Name Field -->
      <div class="form-group">
        <label for="name">Name:</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="Enter your name"
          required
        >
        <div class="error-message" id="nameError">Name is required</div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Enter your email"
          required
        >
        <div class="error-message" id="emailError">Valid email is required</div>
      </div>

      <!-- Gender Select Field (REQUIRED for Cypress Test) -->
      <div class="form-group">
        <label for="gender">Gender:</label>
        <select 
          id="gender" 
          name="gender" 
          required
        >
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <div class="error-message" id="genderError">Please select a gender</div>
      </div>

      <!-- Priority Field -->
      <div class="form-group">
        <label for="priority">Priority:</label>
        <select 
          id="priority" 
          name="priority" 
          required
        >
          <option value="">Select Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <div class="error-message" id="priorityError">Please select a priority</div>
      </div>

      <!-- Task Field -->
      <div class="form-group">
        <label for="task">Task:</label>
        <input 
          type="text" 
          id="task" 
          name="task" 
          placeholder="Enter your task"
          required
        >
        <div class="error-message" id="taskError">Task is required</div>
      </div>

      <!-- Terms and Conditions Checkbox -->
      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="termsCheckbox" 
          name="terms"
        >
        <label for="termsCheckbox">I accept the terms and conditions</label>
      </div>

      <!-- Submit Button (Disabled by default) -->
      <button type="submit" id="submitBtn" class="submit-btn" disabled>
        Submit Form
      </button>

      <!-- Success Message -->
      <div class="success-message" id="successMessage">
        Form submitted successfully!
      </div>
    </form>
  </div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
