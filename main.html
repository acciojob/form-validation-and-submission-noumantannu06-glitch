<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="form-container">
    <h1>Registration Form</h1>

    <form id="registrationForm" action="submit-form.php" method="POST">
      <!-- Name Field -->
      <div class="form-group">
        <label for="name">Full Name:</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="Enter your full name"
          required
        >
        <div class="error-message" id="nameError">Name is required</div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email Address:</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Enter your email"
          required
        >
        <div class="error-message" id="emailError">Valid email is required</div>
      </div>

      <!-- Phone Field -->
      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input 
          type="tel" 
          id="phone" 
          name="phone" 
          placeholder="Enter your phone number"
          required
        >
        <div class="error-message" id="phoneError">Phone number is required</div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required
        >
        <div class="error-message" id="passwordError">Password is required (min 6 characters)</div>
      </div>

      <!-- Terms and Conditions Checkbox -->
      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="termsCheckbox" 
          name="terms"
        >
        <label for="termsCheckbox">I accept the terms and conditions</label>
      </div>

      <!-- Submit Button (Disabled by default) -->
      <button type="submit" id="submitBtn" class="submit-btn" disabled>
        Submit Form
      </button>

      <!-- Success Message -->
      <div class="success-message" id="successMessage">
        Form submitted successfully!
      </div>
    </form>
  </div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
